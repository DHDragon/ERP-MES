server:
  port: 8080

spring:
  application:
    name: erp-backend
  datasource:
    url: jdbc:mysql://localhost:3306/erp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

erp:
  jwt:
    # 需要 >= 256bit
    secret: "erp-demo-secret-please-change-to-32bytes-min"
    expire-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info
